name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # Build frontend (with safe API URL)
      - name: Build frontend
        run: |
          cd frontend
          NEXT_PUBLIC_API_URL=https://dummyjson.com npm run build

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      # Install backend dependencies
      - name: Install backend dependencies
        run: |
          cd backend
          pip install fastapi uvicorn